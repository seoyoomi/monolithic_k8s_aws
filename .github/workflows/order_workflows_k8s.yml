name: deploy order

on:
  push:
    branches:
      - main

jobs:
  # job name
  build-and-deploy:
    #runner
    runs-on: ubuntu-latest

    steps:
      - name: checkout github
        uses: actions/checkout@v2
      
      - name: install kubectl
        uses: azure/setup-kubectl@v3

      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_KEY}}
          aws-secret-access-key: ${{secrets.AWS_SECRET}}
          aws-region: us-west-1

      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region us-west-1 --name lgcns-seoyoomi-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      - name: image build and push docker image to ecr
        env:
          REGISTRY: 310095858382.dkr.ecr.us-west-1.amazonaws.com
          REPOSITORY: order-seoyoomi-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f Docker .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: kubectl apply
        run: |
          kubectl apply -f ./order_redis.yml
          kubectl apply -f ./order_deployment.yml
